<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<title>WeTube</title>
<title>WeTube V1.1 TEST</title>
<style>

body {
    margin:0;
    font-family: Arial, sans-serif;
    background:white;
    color:#111;
}


#login {

    position:fixed;
    inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

}


input {

    width:250px;
    padding:10px;
    margin:6px;

    border:1px solid #ddd;
    border-radius:6px;

}


button {

    padding:10px 16px;

    background:#111;
    color:white;

    border:none;
    border-radius:6px;

    cursor:pointer;

}


header {

    height:55px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:0 25px;

    border-bottom:1px solid #eee;

}



#home {

    max-width:800px;

    margin:auto;

    padding:20px;

}



.video {

    padding:15px;

    border-bottom:1px solid #eee;

    cursor:pointer;

}


.video:hover {

    background:#f7f7f7;

}



/* PLAYER */

#player {

    position:fixed;

    inset:0;

    background:white;

    display:none;

    flex-direction:column;

}



iframe {

    width:100%;

    height:60%;

    border:none;

}



#info {

    padding:20px;

}




#hostPanel {

    max-width:500px;

    margin:30px auto;

    border:1px solid #eee;

    padding:20px;

    display:none;

}



.hidden {

display:none;

}


</style>


</head>


<body>


<!-- LOGIN -->

<div id="login">


<h2>WeTube</h2>


<input id="name" placeholder="Nome">


<input id="password" type="password" placeholder="Password">


<button onclick="login()">Entra</button>


</div>



<!-- APP -->


<div id="app" class="hidden">


<header>

<div>
WeTube
</div>


<input id="search"
placeholder="Cerca..."
oninput="render()">


</header>



<div id="hostPanel">


<h3>Dashboard Host</h3>


<input id="title"
placeholder="Titolo episodio">


<input id="author"
placeholder="Autore">


<input id="videoURL"
placeholder="Link video">


<button onclick="publishVideo()">

Pubblica

</button>


</div>



<div id="home"></div>



</div>




<!-- PLAYER -->


<div id="player">


<button onclick="closePlayer()">

Chiudi

</button>


<iframe id="frame"></iframe>


<div id="info"></div>



</div>




<script>


let user="";

let role="";


let videos=[];



function login(){


let name=document.getElementById("name").value;

let password=document.getElementById("password").value;



if(!name || !password){

alert("Inserisci tutti i dati");

return;

}



user=name;



if(password==="admin123"){

role="host";

document.getElementById("hostPanel").style.display="block";

}

else{

role="user";

}



document.getElementById("login").style.display="none";

document.getElementById("app").classList.remove("hidden");


render();


}




function publishVideo(){



let title=document.getElementById("title").value;

let author=document.getElementById("author").value;

let url=document.getElementById("videoURL").value;



if(!title || !url){

alert("Inserisci titolo e link");

return;

}



videos.push({

title:title,

author:author || user,

url:url

});



document.getElementById("title").value="";

document.getElementById("author").value="";

document.getElementById("videoURL").value="";


render();


}




function render(){


let home=document.getElementById("home");

let search=document.getElementById("search").value.toLowerCase();



home.innerHTML="";



let filtered=videos.filter(v=>


v.title.toLowerCase().includes(search)

);



if(filtered.length===0){


home.innerHTML="<p>Nessun video disponibile.</p>";

return;


}




filtered.forEach(v=>{


let div=document.createElement("div");


div.className="video";


div.innerHTML=

`

<b>${v.title}</b>

<br>

${v.author}

`;



div.onclick=()=>openVideo(v);



home.appendChild(div);



});



}




function openVideo(v){



document.getElementById("player").style.display="flex";


document.getElementById("frame").src=v.url;



document.getElementById("info").innerHTML=

`

<h3>${v.title}</h3>

<p>${v.author}</p>

<p>Visualizzato da ${user}</p>

`;



}




function closePlayer(){


document.getElementById("player").style.display="none";


document.getElementById("frame").src="";


}



</script>



</body>

</html>
