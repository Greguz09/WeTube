<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>WeTube</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #ffffff;
  color: #111;
}

/* LOGIN */
#login {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

input {
  padding: 10px;
  margin: 6px;
  border: 1px solid #ddd;
  border-radius: 6px;
  width: 240px;
}

button {
  padding: 10px 14px;
  margin-top: 6px;
  border: 1px solid #ddd;
  background: #111;
  color: white;
  border-radius: 6px;
  cursor: pointer;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid #eee;
}

#search {
  width: 200px;
}

/* HOME */
#home {
  max-width: 800px;
  margin: auto;
  padding: 20px;
}

.videoCard {
  padding: 14px;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.videoCard:hover {
  background: #f7f7f7;
}

/* PLAYER */
#player {
  position: fixed;
  inset: 0;
  background: #fff;
  display: none;
  flex-direction: column;
}

#player iframe {
  width: 100%;
  height: 60%;
  border: none;
}

#info {
  padding: 16px;
  max-width: 800px;
  margin: auto;
}

.hidden { display: none; }
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <h2>WeTube</h2>
  <input id="name" placeholder="Nome">
  <input id="pass" type="password" placeholder="Password">
  <button onclick="enter()">Entra</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>
  <div>WeTube</div>
  <input id="search" placeholder="Cerca..." oninput="render()">
</header>

<div id="home"></div>

</div>

<!-- PLAYER -->
<div id="player">
  <button onclick="closePlayer()">Chiudi</button>
  <iframe id="frame"></iframe>

  <div id="info"></div>
</div>

<script>
let user = "";
let role = "";

let videos = [
  {
    title: "Benvenuto in WeTube",
    author: "Host",
    url: "https://www.youtube.com/embed/dQw4w9WgXcQ"
  }
];

function enter() {
  const name = document.getElementById("name").value;
  const pass = document.getElementById("pass").value;

  if (!name || !pass) return alert("Inserisci tutto");

  user = name;

  // 👑 HOST (password temporanea)
  if (pass === "admin123") {
    role = "host";
  } else {
    role = "user";
  }

  document.getElementById("login").style.display = "none";
  document.getElementById("app").classList.remove("hidden");

  render();
}

function render() {
  const home = document.getElementById("home");
  const search = document.getElementById("search").value.toLowerCase();

  home.innerHTML = "";

  videos
    .filter(v => v.title.toLowerCase().includes(search))
    .forEach(v => {
      const div = document.createElement("div");
      div.className = "videoCard";
      div.innerHTML = `<b>${v.title}</b><br>${v.author}`;
      div.onclick = () => openVideo(v);
      home.appendChild(div);
    });
}

function openVideo(v) {
  document.getElementById("player").style.display = "flex";
  document.getElementById("frame").src = v.url;

  document.getElementById("info").innerHTML = `
    <h3>${v.title}</h3>
    <p>${v.author}</p>
    <p>Utente: ${user}</p>
    <p>Ruolo: ${role}</p>
  `;
}

function closePlayer() {
  document.getElementById("player").style.display = "none";
  document.getElementById("frame").src = "";
}

</script>

</body>
</html>
