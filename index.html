<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WeTube</title>


<style>

*{
box-sizing:border-box;
}


body{

margin:0;
font-family:Arial, Helvetica, sans-serif;
background:white;
color:#111;

}



/* LOGIN */


#login{

position:fixed;
inset:0;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

}


#login h1{

font-size:44px;
font-weight:600;

margin-bottom:35px;

}



input,
textarea{

width:300px;

padding:13px;

margin:7px;

border:1px solid #ddd;

border-radius:8px;

font-size:15px;

outline:none;

}



input:focus,
textarea:focus{

border-color:#111;

}



textarea{

height:100px;

resize:none;

}




button{

padding:12px 20px;

border:none;

border-radius:8px;

background:#111;

color:white;

cursor:pointer;

font-size:15px;

transition:.2s;

}



button:hover{

opacity:.8;

}




.hidden{

display:none;

}






/* HEADER */


header{

height:70px;

border-bottom:1px solid #eee;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 35px;

}



.logo{

font-size:26px;

font-weight:600;

}



#status{

font-size:14px;

color:#777;

}



#search{

width:280px;

margin:0;

}





/* HOST PANEL */


#hostPanel{

display:none;

max-width:600px;

margin:30px auto;

padding:25px;

border:1px solid #eee;

border-radius:12px;

}



#hostPanel h2{

margin-top:0;

}



.stats{

display:flex;

gap:15px;

margin-top:25px;

margin-bottom:20px;

}



.statBox{

flex:1;

padding:15px;

border:1px solid #eee;

border-radius:10px;

text-align:center;

font-size:14px;

}



.statNumber{

font-size:22px;

font-weight:600;

margin-top:8px;

}







/* HOME */


#home{

max-width:900px;

margin:auto;

padding:30px;

}



.videoCard{

padding:22px 10px;

border-bottom:1px solid #eee;

cursor:pointer;

transition:.2s;

}



.videoCard:hover{

background:#fafafa;

}




.videoTitle{

font-size:22px;

font-weight:500;

}



.videoAuthor{

margin-top:8px;

color:#666;

}



.videoDescription{

margin-top:10px;

color:#444;

}



.videoDate{

margin-top:8px;

font-size:13px;

color:#999;

}



.deleteBtn{

margin-top:15px;

background:white;

color:#111;

border:1px solid #ddd;

}







/* PLAYER */


#player{

display:none;

position:fixed;

inset:0;

background:white;

z-index:20;

overflow:auto;

flex-direction:column;

}



#frame{

width:100%;

height:55%;

border:none;

}



#playerContent{

max-width:900px;

width:100%;

margin:auto;

padding:25px;

}



.closeBtn{

margin:15px;

width:100px;

}







/* LIKE */


.likeBtn{

background:white;

color:#111;

border:1px solid #ddd;

}



.likeBtn:hover{

background:#f5f5f5;

}







/* COMMENTI */


.commentBox{

margin-top:35px;

border-top:1px solid #eee;

padding-top:20px;

}



.comment{

padding:15px 0;

border-bottom:1px solid #eee;

}



.commentUser{

font-weight:bold;

}



.commentText{

margin-top:5px;

color:#444;

}



.commentDelete{

margin-top:10px;

background:white;

color:#111;

border:1px solid #ddd;

padding:8px 14px;

font-size:13px;

}



.commentDelete:hover{

background:#f5f5f5;

}






</style>


</head>



<body>





<div id="login">


<h1>

WeTube

</h1>



<input 
id="name"
placeholder="Nome">



<input
id="password"
type="password"
placeholder="Password">



<button onclick="login()">

Entra

</button>



</div>









<div id="app" class="hidden">



<header>



<div class="logo">

WeTube

</div>



<div id="status">

</div>



<input
id="search"
placeholder="Cerca video..."
oninput="renderVideos()">



</header>









<div id="hostPanel">


<h2>

Dashboard Host

</h2>



<div class="stats">


<div class="statBox">

Video

<div class="statNumber" id="videoCount">

0

</div>

</div>




<div class="statBox">

Like

<div class="statNumber" id="likeCount">

0

</div>

</div>




<div class="statBox">

Commenti

<div class="statNumber" id="commentCount">

0

</div>

</div>



</div>







<input
id="title"
placeholder="Titolo video">



<input
id="author"
placeholder="Autore">



<textarea
id="description"
placeholder="Descrizione">

</textarea>



<input
id="url"
placeholder="Link video">



<button onclick="addVideo()">

Pubblica video

</button>



</div>









<div id="home">

</div>





</div>









<div id="player">


<button class="closeBtn" onclick="closePlayer()">

Chiudi

</button>





<iframe id="frame"></iframe>





<div id="playerContent">

</div>





</div>

<script>


let user = "";

let role = "";

let videos = JSON.parse(localStorage.getItem("wetubeVideos")) || [];

let currentVideo = null;




function saveVideos(){

localStorage.setItem(
"wetubeVideos",
JSON.stringify(videos)
);

}






function login(){


let name =
document.getElementById("name").value;


let password =
document.getElementById("password").value;



if(name==="" || password===""){

alert("Inserisci nome e password");

return;

}



user=name;



if(password==="admin123"){


role="host";


document.getElementById("hostPanel").style.display="block";


document.getElementById("status").innerHTML="Modalità Host";


}
else{


role="user";


document.getElementById("status").innerHTML="Modalità Utente";


}





document.getElementById("login").style.display="none";


document.getElementById("app").classList.remove("hidden");



renderVideos();

updateStats();



}









function addVideo(){



if(role!=="host"){

return;

}





let title =
document.getElementById("title").value;


let author =
document.getElementById("author").value;


let description =
document.getElementById("description").value;


let url =
document.getElementById("url").value;




if(title==="" || url===""){


alert("Inserisci titolo e video");


return;

}





let video={


id:Date.now(),


title:title,


author:author || user,


description:description,


url:url,


likedBy:[],


comments:[],


date:new Date().toLocaleDateString("it-IT")


};





videos.push(video);



saveVideos();



document.getElementById("title").value="";

document.getElementById("author").value="";

document.getElementById("description").value="";

document.getElementById("url").value="";



renderVideos();

updateStats();



}









function renderVideos(){



let home =
document.getElementById("home");



let search =
document.getElementById("search").value.toLowerCase();



home.innerHTML="";





let filtered =
videos.filter(video=>{


return(

video.title.toLowerCase().includes(search)

||

video.author.toLowerCase().includes(search)

||

video.description.toLowerCase().includes(search)

);


});






if(filtered.length===0){


home.innerHTML=`

<p style="text-align:center;color:#777">

Nessun video disponibile

</p>

`;

return;


}







filtered.forEach(video=>{



let card =
document.createElement("div");



card.className="videoCard";



card.innerHTML=`

<div class="videoTitle">

${video.title}

</div>


<div class="videoAuthor">

Creato da ${video.author}

</div>


<div class="videoDescription">

${video.description}

</div>


<div class="videoDate">

${video.date}

</div>

`;






card.onclick=function(){

openVideo(video);

};








if(role==="host"){



let deleteButton =
document.createElement("button");



deleteButton.className="deleteBtn";


deleteButton.innerHTML="Elimina";



deleteButton.onclick=function(event){


event.stopPropagation();


deleteVideo(video.id);


};



card.appendChild(deleteButton);



}






home.appendChild(card);



});



}









function deleteVideo(id){



if(role!=="host"){

return;

}




let answer =
confirm("Eliminare questo video?");



if(!answer){

return;

}



videos =
videos.filter(video=>video.id!==id);



saveVideos();


renderVideos();


updateStats();



}









function openVideo(video){



currentVideo=video;



document.getElementById("player").style.display="flex";



document.getElementById("frame").src=
video.url;



renderPlayer();



}









function renderPlayer(){



let box =
document.getElementById("playerContent");



let liked =
currentVideo.likedBy.includes(user);





box.innerHTML=`

<h2>

${currentVideo.title}

</h2>



<p>

Creato da:

<b>${currentVideo.author}</b>

</p>



<p>

${currentVideo.description}

</p>





<button class="likeBtn" onclick="likeVideo()">

${liked ? "♥ Ti piace" : "♡ Mi piace"}

</button>



<p>

❤️ ${currentVideo.likedBy.length} Mi piace

</p>






<div class="commentBox">



<h3>

Commenti (${currentVideo.comments.length})

</h3>





<input

id="commentInput"

placeholder="Scrivi un commento">



<button onclick="addComment()">

Invia

</button>





<div id="comments">

</div>




</div>



`;




renderComments();



}









function likeVideo(){



let index =
currentVideo.likedBy.indexOf(user);





if(index===-1){


currentVideo.likedBy.push(user);


}
else{


currentVideo.likedBy.splice(index,1);


}





saveVideos();



renderPlayer();



updateStats();



}









function addComment(){



let text =
document.getElementById("commentInput").value;



if(text===""){

return;

}




currentVideo.comments.push({


user:user,


text:text


});





saveVideos();


renderPlayer();


updateStats();



}









function renderComments(){



let area =
document.getElementById("comments");



if(!area){

return;

}




area.innerHTML="";







currentVideo.comments.forEach((comment,index)=>{



let div =
document.createElement("div");



div.className="comment";



div.innerHTML=`

<div class="commentUser">

${comment.user}

</div>



<div class="commentText">

${comment.text}

</div>

`;






if(comment.user===user || role==="host"){



let btn =
document.createElement("button");


btn.className="commentDelete";


btn.innerHTML="Elimina";



btn.onclick=function(){


deleteComment(index);


};



div.appendChild(btn);



}





area.appendChild(div);



});



}









function deleteComment(index){



let answer =
confirm("Eliminare questo commento?");



if(!answer){

return;

}




currentVideo.comments.splice(index,1);



saveVideos();


renderPlayer();


updateStats();



}









function updateStats(){



let videoBox =
document.getElementById("videoCount");


let likeBox =
document.getElementById("likeCount");


let commentBox =
document.getElementById("commentCount");




if(!videoBox){

return;

}





let totalLikes=0;

let totalComments=0;



videos.forEach(video=>{


totalLikes += video.likedBy.length;


totalComments += video.comments.length;


});





videoBox.innerHTML=videos.length;


likeBox.innerHTML=totalLikes;


commentBox.innerHTML=totalComments;



}









function closePlayer(){



document.getElementById("player").style.display="none";


document.getElementById("frame").src="";


currentVideo=null;



}



</script>

  </body>

</html>
