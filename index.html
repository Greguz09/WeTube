<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WeTube</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#fff;
color:#111;

}


/* LOGIN */

#login{

position:fixed;
inset:0;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

}


#login h1{

font-size:40px;
font-weight:500;

}


input, textarea{

width:280px;

padding:12px;

margin:6px;

border:1px solid #ddd;

border-radius:8px;

font-size:15px;

}


textarea{

height:90px;

resize:none;

}


button{

padding:12px 18px;

border:none;

border-radius:8px;

background:#111;

color:white;

cursor:pointer;

font-size:15px;

transition:.2s;

}


button:hover{

opacity:.8;

}


/* APP */

.hidden{

display:none;

}


header{

height:65px;

border-bottom:1px solid #eee;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 30px;

}


.logo{

font-size:24px;

font-weight:600;

}


#search{

width:260px;

margin:0;

}


/* HOME */

#home{

max-width:900px;

margin:auto;

padding:30px;

}


.videoCard{

border-bottom:1px solid #eee;

padding:20px 5px;

cursor:pointer;

transition:.2s;

}


.videoCard:hover{

background:#fafafa;

}


.videoTitle{

font-size:20px;

margin-bottom:8px;

}


.videoAuthor{

color:#666;

}


.videoDescription{

margin-top:8px;

color:#444;

}


/* HOST */

#hostPanel{

max-width:500px;

margin:30px auto;

padding:25px;

border:1px solid #eee;

border-radius:12px;

display:none;

}


#hostPanel h2{

margin-top:0;

}



/* PLAYER */

#player{

position:fixed;

inset:0;

background:white;

display:none;

flex-direction:column;

z-index:10;

}


#player iframe{

width:100%;

height:65%;

border:none;

}


#playerInfo{

padding:25px;

max-width:900px;

}


.close{

margin:15px;

width:100px;

}


/* DELETE */

.deleteBtn{

background:#fff;

color:#111;

border:1px solid #ddd;

margin-top:10px;

}


</style>

</head>


<body>



<div id="login">


<h1>WeTube</h1>


<input id="name" placeholder="Nome">


<input id="password" type="password" placeholder="Password">


<button onclick="login()">

Entra

</button>


</div>



<div id="app" class="hidden">


<header>

<div class="logo">

WeTube

</div>


<input id="search"
placeholder="Cerca video..."
oninput="renderVideos()">


</header>




<div id="hostPanel">


<h2>Dashboard Host</h2>


<input id="title"
placeholder="Titolo episodio">


<input id="author"
placeholder="Autore">


<textarea id="description"
placeholder="Descrizione"></textarea>


<input id="url"
placeholder="Link video">


<button onclick="addVideo()">

Pubblica episodio

</button>


</div>




<div id="home">

</div>



</div>





<div id="player">


<button class="close" onclick="closePlayer()">

Chiudi

</button>


<iframe id="frame"></iframe>


<div id="playerInfo"></div>


</div>

    <script>

let user = "";
let role = "";

let videos = JSON.parse(localStorage.getItem("wetubeVideos")) || [];



function login(){

let name = document.getElementById("name").value;
let password = document.getElementById("password").value;


if(!name || !password){

alert("Inserisci nome e password");
return;

}


user = name;


if(password === "admin123"){

role = "host";

document.getElementById("hostPanel").style.display = "block";

}

else{

role = "user";

}



document.getElementById("login").style.display="none";

document.getElementById("app").classList.remove("hidden");


renderVideos();


}





function addVideo(){


if(role !== "host"){

return;

}


let title =
document.getElementById("title").value;


let author =
document.getElementById("author").value;


let description =
document.getElementById("description").value;


let url =
document.getElementById("url").value;



if(!title || !url){

alert("Inserisci almeno titolo e link");

return;

}




let video = {


id: Date.now(),


title:title,


author:author || user,


description:description,


url:url,


date:new Date().toLocaleDateString("it-IT")


};



videos.push(video);



saveVideos();


document.getElementById("title").value="";

document.getElementById("author").value="";

document.getElementById("description").value="";

document.getElementById("url").value="";


renderVideos();



}




function saveVideos(){

localStorage.setItem(
"wetubeVideos",
JSON.stringify(videos)
);

}




function renderVideos(){


let home =
document.getElementById("home");


let search =
document.getElementById("search").value.toLowerCase();



home.innerHTML="";



let filtered =
videos.filter(video => {


return (

video.title.toLowerCase().includes(search)

||

video.author.toLowerCase().includes(search)

||

video.description.toLowerCase().includes(search)

);


});



if(filtered.length === 0){


home.innerHTML =

`

<p style="text-align:center;color:#777">

Nessun video disponibile.

</p>

`;


return;

}




filtered.forEach(video => {



let card =
document.createElement("div");


card.className="videoCard";



card.innerHTML =

`

<div class="videoTitle">

${video.title}

</div>


<div class="videoAuthor">

${video.author}

</div>


<div class="videoDescription">

${video.description}

</div>


<div style="color:#999;margin-top:8px;font-size:13px">

${video.date}

</div>


`;



card.onclick = function(){

openVideo(video);

};



if(role === "host"){



let deleteButton =
document.createElement("button");


deleteButton.className="deleteBtn";


deleteButton.innerText="Elimina";


deleteButton.onclick=function(event){


event.stopPropagation();


deleteVideo(video.id);


};



card.appendChild(deleteButton);



}



home.appendChild(card);



});



}





function deleteVideo(id){


if(role !== "host") return;



let confirmDelete =
confirm("Eliminare questo episodio?");


if(!confirmDelete) return;



videos =
videos.filter(video => video.id !== id);



saveVideos();


renderVideos();



}




function openVideo(video){


document.getElementById("player").style.display="flex";



document.getElementById("frame").src =
video.url;



document.getElementById("playerInfo").innerHTML =


`

<h2>${video.title}</h2>


<p>

Creato da: ${video.author}

</p>


<p>

${video.description}

</p>


<p style="color:#777">

Visualizzato da ${user}

</p>

`;



}




function closePlayer(){


document.getElementById("player").style.display="none";


document.getElementById("frame").src="";


}



</script>


</body>

</html>
