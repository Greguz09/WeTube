<!DOCTYPE html>
<html lang="it">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WeTube</title>


<style>


*{
box-sizing:border-box;
}


body{

margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#ffffff;
color:#111;

}


/* LOGIN */


#login{

position:fixed;
inset:0;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

}


#login h1{

font-size:44px;
font-weight:600;
margin-bottom:35px;

}



input,
textarea{

width:300px;

padding:13px;

margin:7px;

border:1px solid #ddd;

border-radius:8px;

font-size:15px;

}


textarea{

height:100px;

resize:none;

}




button{

padding:12px 20px;

border:none;

border-radius:8px;

background:#111;

color:white;

cursor:pointer;

font-size:15px;

transition:.2s;

}



button:hover{

opacity:.8;

}



.hidden{

display:none;

}




/* APP */


header{

height:70px;

border-bottom:1px solid #eee;

display:flex;

align-items:center;

justify-content:space-between;

padding:0 35px;

}



.logo{

font-size:26px;

font-weight:600;

}



#status{

font-size:14px;

color:#777;

}



#search{

width:280px;

margin:0;

}



/* HOST */


#hostPanel{

display:none;

max-width:520px;

margin:30px auto;

padding:25px;

border:1px solid #eee;

border-radius:12px;

}



#hostPanel h2{

margin-top:0;

}





/* HOME */


#home{

max-width:900px;

margin:auto;

padding:30px;

}



.videoCard{

padding:22px 10px;

border-bottom:1px solid #eee;

cursor:pointer;

}



.videoCard:hover{

background:#fafafa;

}



.videoTitle{

font-size:22px;

font-weight:500;

}



.videoAuthor{

margin-top:8px;

color:#666;

}



.videoDescription{

margin-top:10px;

color:#444;

}



.videoDate{

margin-top:8px;

font-size:13px;

color:#999;

}




.deleteBtn{

margin-top:15px;

background:white;

color:#111;

border:1px solid #ddd;

}





/* PLAYER */


#player{

display:none;

position:fixed;

inset:0;

background:white;

z-index:20;

overflow:auto;

flex-direction:column;

}



#frame{

width:100%;

height:55%;

border:none;

}



#playerContent{

max-width:900px;

width:100%;

margin:auto;

padding:25px;

}



.closeBtn{

margin:15px;

width:100px;

}



/* LIKE */


.likeBtn{

background:white;

color:#111;

border:1px solid #ddd;

}




/* COMMENTI */


.commentBox{

margin-top:35px;

border-top:1px solid #eee;

padding-top:20px;

}



.comment{

padding:12px 0;

border-bottom:1px solid #eee;

}



.commentUser{

font-weight:bold;

}



.commentText{

margin-top:5px;

color:#444;

}




</style>


</head>



<body>



<div id="login">


<h1>WeTube</h1>


<input 
id="name"
placeholder="Nome">


<input
id="password"
type="password"
placeholder="Password">


<button onclick="login()">

Entra

</button>


</div>





<div id="app" class="hidden">



<header>


<div class="logo">

WeTube

</div>



<div id="status"></div>




<input
id="search"
placeholder="Cerca video..."
oninput="renderVideos()">



</header>





<div id="hostPanel">


<h2>

Dashboard Host

</h2>



<input
id="title"
placeholder="Titolo video">



<input
id="author"
placeholder="Autore">



<textarea
id="description"
placeholder="Descrizione">

</textarea>



<input
id="url"
placeholder="Link video">



<button onclick="addVideo()">

Pubblica video

</button>


</div>





<div id="home">

</div>




</div>





<div id="player">



<button class="closeBtn" onclick="closePlayer()">

Chiudi

</button>



<iframe id="frame"></iframe>



<div id="playerContent">

</div>



</div>

  <script>


let user = "";

let role = "";

let videos = JSON.parse(localStorage.getItem("wetubeVideos")) || [];

let currentVideo = null;



function saveVideos(){

localStorage.setItem(
"wetubeVideos",
JSON.stringify(videos)
);

}





function login(){



let name =
document.getElementById("name").value;



let password =
document.getElementById("password").value;



if(name==="" || password===""){

alert("Inserisci nome e password");

return;

}



user=name;



if(password==="admin123"){


role="host";


document.getElementById("hostPanel").style.display="block";


document.getElementById("status").innerHTML=

"Modalità Host";


}

else{


role="user";


document.getElementById("status").innerHTML=

"Modalità Utente";


}




document.getElementById("login").style.display="none";


document.getElementById("app").classList.remove("hidden");



renderVideos();



}





function addVideo(){



if(role!=="host"){

return;

}



let title =
document.getElementById("title").value;



let author =
document.getElementById("author").value;



let description =
document.getElementById("description").value;



let url =
document.getElementById("url").value;




if(title==="" || url===""){


alert("Inserisci titolo e video");


return;


}





let video={


id:Date.now(),


title:title,


author:author || user,


description:description,


url:url,


likes:0,


comments:[],


date:new Date().toLocaleDateString("it-IT")


};




videos.push(video);



saveVideos();



document.getElementById("title").value="";

document.getElementById("author").value="";

document.getElementById("description").value="";

document.getElementById("url").value="";



renderVideos();



}





function renderVideos(){



let home =
document.getElementById("home");



let search =
document.getElementById("search").value.toLowerCase();




home.innerHTML="";




let filtered =
videos.filter(video=>{


return (

video.title.toLowerCase().includes(search)

||

video.author.toLowerCase().includes(search)

||

video.description.toLowerCase().includes(search)

);


});





if(filtered.length===0){


home.innerHTML=

`

<p style="text-align:center;color:#777">

Nessun video disponibile

</p>

`;

return;


}





filtered.forEach(video=>{


let card =
document.createElement("div");



card.className="videoCard";



card.innerHTML=

`

<div class="videoTitle">

${video.title}

</div>


<div class="videoAuthor">

Creato da ${video.author}

</div>


<div class="videoDescription">

${video.description}

</div>


<div class="videoDate">

${video.date}

</div>

`;




card.onclick=function(){

openVideo(video);

};






if(role==="host"){



let button =
document.createElement("button");



button.className="deleteBtn";



button.innerHTML="Elimina";



button.onclick=function(event){



event.stopPropagation();



deleteVideo(video.id);



};




card.appendChild(button);



}





home.appendChild(card);



});



}





function deleteVideo(id){



if(role!=="host"){

return;

}




let confirmDelete =
confirm("Eliminare questo video?");



if(!confirmDelete){

return;

}



videos =
videos.filter(video=>video.id!==id);



saveVideos();



renderVideos();



}







function openVideo(video){



currentVideo=video;



document.getElementById("player").style.display="flex";



document.getElementById("frame").src=
video.url;



renderPlayer();



}





function renderPlayer(){



let box =
document.getElementById("playerContent");



box.innerHTML=

`

<h2>${currentVideo.title}</h2>


<p>

Creato da:

<b>${currentVideo.author}</b>

</p>


<p>

${currentVideo.description}

</p>



<button class="likeBtn" onclick="likeVideo()">

♥ ${currentVideo.likes} Mi piace

</button>



<div class="commentBox">


<h3>

Commenti

</h3>



<input 
id="commentInput"
placeholder="Scrivi commento">



<button onclick="addComment()">

Invia

</button>



<div id="comments">

</div>



</div>


`;



renderComments();



}





function likeVideo(){



currentVideo.likes++;



saveVideos();



renderPlayer();



}







function addComment(){



let text =
document.getElementById("commentInput").value;



if(text===""){

return;

}



currentVideo.comments.push({


user:user,


text:text


});



saveVideos();



renderPlayer();



}







function renderComments(){



let area =
document.getElementById("comments");



if(!area){

return;

}



area.innerHTML="";




currentVideo.comments.forEach(comment=>{


let div =
document.createElement("div");



div.className="comment";



div.innerHTML=

`

<div class="commentUser">

${comment.user}

</div>


<div class="commentText">

${comment.text}

</div>

`;



area.appendChild(div);



});



}





function closePlayer(){



document.getElementById("player").style.display="none";



document.getElementById("frame").src="";



currentVideo=null;



}



</script>


</body>

</html>
